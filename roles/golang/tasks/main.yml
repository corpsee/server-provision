---

- name: "Add Golang{{ golang_version }} PPA repositories GPG key"
  apt_key:
    id: "52B59B1571A79DBC054901C0F6BC817356A3D45E"
    keyserver: "keyserver.ubuntu.com"
    keyring: "/usr/share/keyrings/golang.gpg"
    state: present

- name: "Add Golang{{ golang_version }} PPA repository"
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/golang.gpg] https://ppa.launchpadcontent.net/longsleep/golang-backports/ubuntu {{ ansible_distribution_release }} main"
    filename: golang
    update_cache: yes

- name: "Install Golang{{ golang_version }}"
  apt:
    name: "golang-{{ golang_version }}"
    state: present

- name: "Create symlink to /usr/local/bin fo Golang{{ golang_version }}"
  file:
    src: "/usr/lib/go-{{ golang_version }}/bin/go"
    dest: "/usr/local/bin/go{{ golang_version }}"
    state: link

- name: "Create symlink to /usr/local/bin fo Golang{{ golang_version }} Fmt"
  file:
    src: "/usr/lib/go-{{ golang_version }}/bin/gofmt"
    dest: "/usr/local/bin/gofmt{{ golang_version }}"
    state: link

- name: "Set Golang{{ golang_version }} to update-alternatives"
  command:
    cmd: update-alternatives --install "/usr/local/bin/go" go "/usr/local/bin/go{{ golang_version }}" "{{ golang_priority }}"

- name: "Set Golang{{ golang_version }} Fmt to update-alternatives"
  command:
    cmd: update-alternatives --install "/usr/local/bin/gofmt" gofmt "/usr/local/bin/gofmt{{ golang_version }}" "{{ golang_priority }}"
