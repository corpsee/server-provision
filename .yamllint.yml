---

extends: default

rules:
  colons: disable
  line-length: disable
  comments:
    min-spaces-from-content: 1
  braces:
    min-spaces-inside: 1
    max-spaces-inside: 1
  truthy:
    allowed-values: ["yes", "no"]
    level: error

ignore:
  - 'files/*'
  - 'inventories/group_vars/*/secret.yml'
  - 'roles/php_censor/files/*'
  - 'roles/php_censor_release/files/*'
  - 'roles/php_censor/templates/config.yml'
  - 'roles/corpsee_site_release/files/*'
  - 'roles/corpsee_site/files/*'
